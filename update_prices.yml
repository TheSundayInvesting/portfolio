name: Update Portfolio Prices

on:
  schedule:
    # Every 30 minutes during market hours (Mon-Fri, 13:00-21:30 UTC = 8am-4:30pm EST)
    - cron: '*/30 13-21 * * 1-5'
    # Also once at market open and close
    - cron: '30 13 * * 1-5'
    - cron: '0 21 * * 1-5'
    # Crypto: every 30 mins around the clock
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch prices and write prices.json
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time, os, datetime

          FINNHUB_KEY = os.environ.get('FINNHUB_KEY', '')

          holdings = [
            {"ticker":"APLD",  "finnhub":"APLD",            "cat":"stock",  "yahoo":"APLD",    "coingecko":None},
            {"ticker":"SOUN",  "finnhub":"SOUN",            "cat":"stock",  "yahoo":"SOUN",    "coingecko":None},
            {"ticker":"HOOD",  "finnhub":"HOOD",            "cat":"stock",  "yahoo":"HOOD",    "coingecko":None},
            {"ticker":"SOFI",  "finnhub":"SOFI",            "cat":"stock",  "yahoo":"SOFI",    "coingecko":None},
            {"ticker":"QBTS",  "finnhub":"QBTS",            "cat":"stock",  "yahoo":"QBTS",    "coingecko":None},
            {"ticker":"TSLA",  "finnhub":"TSLA",            "cat":"stock",  "yahoo":"TSLA",    "coingecko":None},
            {"ticker":"NVDA",  "finnhub":"NVDA",            "cat":"stock",  "yahoo":"NVDA",    "coingecko":None},
            {"ticker":"OSCR",  "finnhub":"OSCR",            "cat":"stock",  "yahoo":"OSCR",    "coingecko":None},
            {"ticker":"GRAB",  "finnhub":"GRAB",            "cat":"stock",  "yahoo":"GRAB",    "coingecko":None},
            {"ticker":"PLTR",  "finnhub":"PLTR",            "cat":"stock",  "yahoo":"PLTR",    "coingecko":None},
            {"ticker":"RKLB",  "finnhub":"RKLB",            "cat":"stock",  "yahoo":"RKLB",    "coingecko":None},
            {"ticker":"HIMS",  "finnhub":"HIMS",            "cat":"stock",  "yahoo":"HIMS",    "coingecko":None},
            {"ticker":"BMNR",  "finnhub":"BMNR",            "cat":"stock",  "yahoo":"BMNR",    "coingecko":None},
            {"ticker":"QQQ",   "finnhub":"QQQ",             "cat":"etf",    "yahoo":"QQQ",     "coingecko":None},
            {"ticker":"IVV",   "finnhub":"IVV",             "cat":"etf",    "yahoo":"IVV",     "coingecko":None},
            {"ticker":"INDA",  "finnhub":"INDA",            "cat":"etf",    "yahoo":"INDA",    "coingecko":None},
            {"ticker":"SLV",   "finnhub":"SLV",             "cat":"etf",    "yahoo":"SLV",     "coingecko":None},
            {"ticker":"IAU",   "finnhub":"IAU",             "cat":"etf",    "yahoo":"IAU",     "coingecko":None},
            {"ticker":"XRP",   "finnhub":None,              "cat":"crypto", "yahoo":"XRP-USD", "coingecko":"ripple"},
            {"ticker":"SOL",   "finnhub":None,              "cat":"crypto", "yahoo":"SOL-USD", "coingecko":"solana"},
            {"ticker":"BTC",   "finnhub":None,              "cat":"crypto", "yahoo":"BTC-USD", "coingecko":"bitcoin"},
            {"ticker":"ETH",   "finnhub":None,              "cat":"crypto", "yahoo":"ETH-USD", "coingecko":"ethereum"},
            {"ticker":"AAF.L", "finnhub":None,              "cat":"uk",     "yahoo":"AAF.L",   "coingecko":None},
            {"ticker":"RR.L",  "finnhub":None,              "cat":"uk",     "yahoo":"RR.L",    "coingecko":None},
          ]

          prices = {}

          def fetch_url(url, timeout=10):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"  FAILED {url[:60]}: {e}")
                  return None

          # ── 1. CoinGecko for crypto ──────────────────────────────────
          print("Fetching crypto via CoinGecko...")
          crypto = [h for h in holdings if h['cat'] == 'crypto']
          ids = ','.join(h['coingecko'] for h in crypto if h['coingecko'])
          cg_url = f"https://api.coingecko.com/api/v3/simple/price?ids={ids}&vs_currencies=usd&include_24hr_change=true&precision=6"
          cg_data = fetch_url(cg_url)
          if cg_data:
              for h in crypto:
                  cid = h['coingecko']
                  if cid and cid in cg_data and cg_data[cid].get('usd'):
                      price   = cg_data[cid]['usd']
                      chg_pct = (cg_data[cid].get('usd_24h_change') or 0) / 100
                      prev    = price / (1 + chg_pct) if chg_pct != -1 else price
                      prices[h['ticker']] = {'price': price, 'prevClose': prev, 'dailyPct': chg_pct, 'source': 'coingecko'}
                      print(f"  {h['ticker']}: ${price:.4f} ({chg_pct*100:+.2f}%)")

          # ── 2. Finnhub for US stocks + ETFs ─────────────────────────
          if FINNHUB_KEY:
              print("Fetching stocks/ETFs via Finnhub...")
              us = [h for h in holdings if h['cat'] in ('stock', 'etf') and h['finnhub']]
              for h in us:
                  url = f"https://finnhub.io/api/v1/quote?symbol={h['finnhub']}&token={FINNHUB_KEY}"
                  d = fetch_url(url)
                  if d and d.get('c') and d['c'] != 0:
                      price = d['c']
                      prev  = d.get('pc') or price
                      chg   = (price - prev) / prev if prev else 0
                      prices[h['ticker']] = {'price': price, 'prevClose': prev, 'dailyPct': chg, 'source': 'finnhub'}
                      print(f"  {h['ticker']}: ${price:.2f} ({chg*100:+.2f}%)")
                  time.sleep(0.1)  # stay within 60/min rate limit
          else:
              print("No FINNHUB_KEY — skipping Finnhub")

          # ── 3. Yahoo Finance for UK stocks + any missing ────────────
          missing = [h for h in holdings if h['ticker'] not in prices]
          if missing:
              print(f"Fetching {len(missing)} via Yahoo Finance: {[h['ticker'] for h in missing]}")
              for h in missing:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{h['yahoo']}?interval=1d&range=2d"
                  d = fetch_url(url)
                  if d:
                      try:
                          meta  = d['chart']['result'][0]['meta']
                          price = meta['regularMarketPrice']
                          prev  = meta.get('chartPreviousClose') or meta.get('previousClose') or price
                          if h['cat'] == 'uk':
                              price /= 100
                              prev  /= 100
                          chg = (price - prev) / prev if prev else 0
                          prices[h['ticker']] = {'price': price, 'prevClose': prev, 'dailyPct': chg, 'source': 'yahoo'}
                          print(f"  {h['ticker']}: ${price:.4f} ({chg*100:+.2f}%)")
                      except Exception as e:
                          print(f"  {h['ticker']}: parse error {e}")
                  time.sleep(0.3)

          # ── Write prices.json ────────────────────────────────────────
          output = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "prices": prices
          }
          with open('prices.json', 'w') as f:
              json.dump(output, f, indent=2)

          total = len(holdings)
          got   = len(prices)
          print(f"\nDone: {got}/{total} prices fetched")
          if got < total:
              missing_t = [h['ticker'] for h in holdings if h['ticker'] not in prices]
              print(f"Missing: {missing_t}")
          PYEOF

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          # Only commit if file changed
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit"
          else
            UPDATED=$(python3 -c "import json; d=json.load(open('prices.json')); print(d['updated'])")
            COUNT=$(python3 -c "import json; d=json.load(open('prices.json')); print(len(d['prices']))")
            git commit -m "prices: ${COUNT} tickers updated ${UPDATED}"
            git push
          fi
